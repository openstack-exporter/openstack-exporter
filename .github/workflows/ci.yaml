name: ci

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_URL }}
  IMAGE_NAME: kt-cloud-stack/openstack-exporter
  HARBOR_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  HARBOR_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  hadolint:
    runs-on:
      group: enterprise/Default
      labels: cicd-ys-ext-build-worker
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4
      - uses: reviewdog/action-hadolint@921946a7ebaaf08ac72607bad67209f4e52b5407 # v1.50.5
        with:
          fail_level: any
          filter_mode: nofilter

  shellcheck:
    runs-on:
      group: enterprise/Default
      labels: cicd-ys-ext-build-worker
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4
      - uses: reviewdog/action-shellcheck@5ebd09ddbe2ebb471646ce234c6c8dd18663ca7c # v1.30.0
        with:
          fail_level: any
          filter_mode: nofilter

  actionlint:
    runs-on:
      group: enterprise/Default
      labels: cicd-ys-ext-build-worker
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4
      - uses: reviewdog/action-actionlint@e58ee9d111489c31395fbe4857b0be6e7635dbda # v1.70.0
        with:
          fail_level: any
          filter_mode: nofilter

  markdownlint:
    runs-on:
      group: enterprise/Default
      labels: cicd-ys-ext-build-worker
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4
      - uses: reviewdog/action-markdownlint@3667398db9118d7e78f7a63d10e26ce454ba5f58 # v0.26.2
        with:
          fail_level: any
          filter_mode: nofilter

  golangci-lint:
    runs-on:
      group: enterprise/Default
      labels: cicd-ys-ext-build-worker
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4
        with:
          fetch-depth: 0
      - uses: reviewdog/action-golangci-lint@f9bba13753278f6a73b27a56a3ffb1bfda90ed71 # v2.8.0
        with:
          fail_level: any
          filter_mode: nofilter

  build:
    name: Build and test
    permissions:
      contents: write
      packages: write
    runs-on:
      group: enterprise/Default
      labels: cicd-ys-ext-build-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to the Container registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.HARBOR_USERNAME }}
          password: ${{ env.HARBOR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Unit tests
        run: |
          go test -v -covermode=atomic -coverprofile=coverage.out ./...

      - name: Resolve IMAGE_TAG
        run: |
          VERSION=$(cat VERSION)
          echo "IMAGE_TAG=ktc-${VERSION}-b$(date +%s)" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          labels: ${{ steps.meta.outputs.labels }}

      # This step runs ONLY when a tag is pushed
      - name: Run GoReleaser (Tag Release)
        if: contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # This step runs on anything EXCEPT tags
      - name: Run GoReleaser (Snapshot)
        if: ${{ !contains(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
